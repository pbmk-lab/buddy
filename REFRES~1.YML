name: .github/workflows/refresh-usage.yml
on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-usage
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch usage from Anthropic Admin API
        env:
          ANTHROPIC_ADMIN_KEY: ${{ secrets.ANTHROPIC_ADMIN_KEY }}
        run: node fetch-usage.mjs

      - name: Commit updated usage.json
        run: |
          if git diff --quiet usage.json; then
            echo "No changes"
            exit 0
          fi
          git config user.name  "buddy-bot"
          git config user.email "buddy-bot@users.noreply.github.com"
          git add usage.json
          git commit -m "chore: refresh usage [skip ci]"
          git push
